<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>NetScout Pi - Tools</title>
  <link rel="stylesheet" href="/style.css">

  <style>
    /* Tools page only. Does not change global NetSc0ut background/style.css. */

    .tools-page {
      max-width: 1050px;
    }

    .tools-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .tools-toolbar-left {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tools-count-box {
      border: 1px solid #39ff14;
      border-radius: 12px;
      padding: 10px 14px;
      min-width: 115px;
      text-align: center;
      background: #050806;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.18);
    }

    .tools-count-box strong {
      display: block;
      color: #39ff14;
      font-size: 28px;
      line-height: 1;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.65);
    }

    .tools-count-box span {
      display: block;
      margin-top: 5px;
      color: #a8ff98;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .tools-intro {
      border-color: #39ff14;
    }

    .tools-intro h2 {
      margin: 0 0 8px;
      color: #e8f0f2;
      font-size: 26px;
    }

    .tools-intro p {
      margin: 0;
      color: #a8ff98;
      line-height: 1.45;
    }

    .tools-list {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .tool-section {
      border: 1px solid #1d5c17;
      border-radius: 16px;
      overflow: hidden;
      background: #0b120e;
      box-shadow: 0 0 12px rgba(57, 255, 20, 0.08);
    }

    .tool-section-title {
      padding: 13px 16px;
      background: #081009;
      border-bottom: 1px solid #1d5c17;
      color: #39ff14;
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 0 0 7px rgba(57, 255, 20, 0.45);
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
      gap: 14px;
      padding: 14px;
    }

    .tool-card {
      position: relative;
      border: 1px solid #245c24;
      border-radius: 14px;
      padding: 15px 15px 15px 19px;
      background: #081009;
      box-shadow: inset 0 0 0 1px rgba(57, 255, 20, 0.04);
    }

    .tool-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 13px;
      bottom: 13px;
      width: 4px;
      background: #39ff14;
      border-radius: 0 5px 5px 0;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.75);
    }

    .tool-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 9px;
    }

    .tool-top h3 {
      margin: 0;
      color: #e8f0f2;
      font-size: 20px;
      line-height: 1.25;
    }

    .tool-status {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
      background: #050806;
      border: 1px solid #7d2424;
      color: #ff7777;
    }

    .tool-status.running {
      color: #39ff14;
      border-color: #39ff14;
      box-shadow: 0 0 8px rgba(57, 255, 20, 0.25);
    }

    .tool-description {
      margin: 0 0 12px;
      color: #b7c5bb;
      font-size: 14px;
      line-height: 1.4;
      min-height: 40px;
    }

    .tool-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 13px;
    }

    .tool-detail {
      border: 1px solid #1d5c17;
      border-radius: 9px;
      padding: 7px 8px;
      background: #050806;
      font-size: 13px;
      color: #d9e6dc;
    }

    .tool-detail b {
      display: block;
      color: #39ff14;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .tool-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tool-actions button {
      padding: 11px 10px;
      font-size: 14px;
      border-radius: 10px;
    }

    .tool-actions .stop-button {
      background: #160707;
      color: #ffb3b3;
      border: 1px solid #ff4d4d;
      box-shadow: 0 0 8px rgba(255, 77, 77, 0.12);
    }

    .tool-actions .console-button {
      grid-column: span 2;
      background: #0b120e;
      color: #a8ff98;
      border: 1px solid #1d5c17;
      box-shadow: 0 0 8px rgba(57, 255, 20, 0.10);
    }

    .tool-command {
      margin-top: 12px;
      padding: 8px;
      border: 1px solid #123812;
      border-radius: 8px;
      background: #030503;
      color: #7cff6b;
      font-size: 12px;
      white-space: nowrap;
      overflow-x: auto;
      opacity: 0.85;
    }

    .tools-empty {
      padding: 18px;
      color: #a8ff98;
    }

    @media (max-width: 700px) {
      .tools-toolbar {
        align-items: stretch;
      }

      .tools-toolbar-left {
        width: 100%;
      }

      .tools-toolbar-left button {
        flex: 1;
      }

      .tools-count-box {
        width: 100%;
      }

      .tool-grid {
        grid-template-columns: 1fr;
      }

      .tool-details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Tools</h1>
  <p>Compiled Tool Launcher</p>
</header>

<main class="tools-page">

<section class="card tools-toolbar">
  <div class="tools-toolbar-left">
    <button onclick="location.href='/'">← Home</button>
    <button onclick="loadCompiledTools()">Refresh</button>
    <button onclick="location.href='/console.html'">Open Console</button>
  </div>

  <div class="tools-count-box">
    <strong id="tool-count">0</strong>
    <span>TOOLS LOADED</span>
  </div>
</section>

<section class="card tools-intro">
  <h2>NetSc0ut Tool Bay</h2>
  <p>Launch scanners, capture tools, RF modules, and network utilities.</p>
</section>

<div id="compiled-tools" class="tools-list">
  <section class="tool-section">
    <div class="tools-empty">Loading tools...</div>
  </section>
</div>

</main>

<script>
async function loadCompiledTools() {
  const box = document.getElementById("compiled-tools");
  const countBox = document.getElementById("tool-count");

  box.innerHTML = `
    <section class="tool-section">
      <div class="tools-empty">Loading tools...</div>
    </section>
  `;

  try {
    const res = await fetch("/api/tools");
    const payload = await res.json();
    const tools = Array.isArray(payload) ? payload : payload.tools || [];

    countBox.textContent = tools.length;
    box.innerHTML = "";

    if (!tools.length) {
      box.innerHTML = `
        <section class="tool-section">
          <div class="tools-empty">No tools found.</div>
        </section>
      `;
      return;
    }

    const grouped = {};

    tools.forEach(tool => {
      const category = tool.category || guessCategory(tool);

      if (!grouped[category]) {
        grouped[category] = [];
      }

      grouped[category].push(tool);
    });

    const order = [
      "Wireless / Capture",
      "Bluetooth / BLE",
      "RF / SDR",
      "Cellular",
      "Network Utilities",
      "System Tools"
    ];

    const categories = Object.keys(grouped).sort((a, b) => {
      const ai = order.indexOf(a);
      const bi = order.indexOf(b);

      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });

    categories.forEach(category => {
      const section = document.createElement("section");
      section.className = "tool-section";

      const title = document.createElement("div");
      title.className = "tool-section-title";
      title.textContent = category;

      const grid = document.createElement("div");
      grid.className = "tool-grid";

      grouped[category].forEach(tool => {
        grid.appendChild(buildToolCard(tool));
      });

      section.appendChild(title);
      section.appendChild(grid);
      box.appendChild(section);
    });

  } catch (err) {
    box.innerHTML = `
      <section class="tool-section">
        <div class="tools-empty">Error loading tools.</div>
      </section>
    `;
  }
}

function buildToolCard(tool) {
  const card = document.createElement("article");
  card.className = "tool-card";

  const running = !!tool.running;
  const name = tool.name || tool.id || "Unnamed Tool";
  const description = tool.description || guessDescription(tool);
  const type = tool.type || "console";
  const iface = tool.requires_interface || "None";
  const monitor = tool.requires_monitor ? "Required" : "Not required";
  const command = tool.command || "";

  card.innerHTML = `
    <div class="tool-top">
      <h3>${escapeHtml(name)}</h3>
      <span class="tool-status ${running ? "running" : ""}">
        ${running ? "RUNNING" : "STOPPED"}
      </span>
    </div>

    <p class="tool-description">${escapeHtml(description)}</p>

    <div class="tool-details">
      <div class="tool-detail">
        <b>Type</b>
        ${escapeHtml(type)}
      </div>

      <div class="tool-detail">
        <b>Interface</b>
        ${escapeHtml(iface)}
      </div>

      <div class="tool-detail">
        <b>Monitor Mode</b>
        ${escapeHtml(monitor)}
      </div>

      <div class="tool-detail">
        <b>Tool ID</b>
        ${escapeHtml(tool.id || "unknown")}
      </div>
    </div>

    <div class="tool-actions">
      <button onclick="startTool('${escapeJs(tool.id)}')">Start</button>
      <button class="stop-button" onclick="stopTool('${escapeJs(tool.id)}')">Stop</button>
      <button class="console-button" onclick="location.href='/console.html'">View Console</button>
    </div>

    ${command ? `<div class="tool-command">${escapeHtml(command)}</div>` : ""}
  `;

  return card;
}

function guessCategory(tool) {
  const text = `${tool.id || ""} ${tool.name || ""} ${tool.command || ""}`.toLowerCase();

  if (text.includes("blue") || text.includes("ble") || text.includes("bluetooth") || text.includes("hci")) {
    return "Bluetooth / BLE";
  }

  if (text.includes("nrf") || text.includes("sdr") || text.includes("rtl") || text.includes("radio")) {
    return "RF / SDR";
  }

  if (text.includes("sniffer") || text.includes("handshake") || text.includes("wifi") || text.includes("wlan") || text.includes("pwn")) {
    return "Wireless / Capture";
  }

  if (text.includes("nmap") || text.includes("device") || text.includes("speed") || text.includes("lan")) {
    return "Network Utilities";
  }

  return "System Tools";
}

function guessDescription(tool) {
  const text = `${tool.id || ""} ${tool.name || ""} ${tool.command || ""}`.toLowerCase();

  if (text.includes("handshake")) {
    return "Captures WPA handshake activity using a monitor-mode Wi-Fi adapter.";
  }

  if (text.includes("sniffer")) {
    return "Runs wireless capture and streams output to the NetSc0ut console.";
  }

  if (text.includes("blue") || text.includes("ble")) {
    return "Scans nearby Bluetooth and BLE devices.";
  }

  if (text.includes("nrf")) {
    return "Scans NRF24L01 2.4 GHz radio activity.";
  }

  if (text.includes("sdr") || text.includes("rtl")) {
    return "Runs software-defined radio scanning tools.";
  }

  if (text.includes("speed")) {
    return "Runs a network speed and latency test.";
  }

  if (text.includes("device") || text.includes("nmap")) {
    return "Identifies LAN devices, vendors, and services.";
  }

  return "Compiled NetSc0ut tool launcher.";
}

async function startTool(toolId) {
  const res = await fetch(`/api/tools/${encodeURIComponent(toolId)}/start`, {
    method: "POST"
  });

  const data = await res.json();

  if (data.ok || data.status === "ok") {
    window.location.href = data.redirect || "/console.html";
  } else {
    alert(data.error || data.message || "Failed to start tool");
  }
}

async function stopTool(toolId) {
  try {
    await fetch(`/api/tools/${encodeURIComponent(toolId)}/stop`, {
      method: "POST"
    });

    loadCompiledTools();

  } catch (err) {
    alert("Error stopping tool");
  }
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function escapeJs(value) {
  return String(value || "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'");
}

loadCompiledTools();
</script>

</body>
</html>
